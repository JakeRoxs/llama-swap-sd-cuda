name: Build image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - Dockerfile.llama-swappo
      - docker/llama-swappo/**
      - .github/workflows/build.yml
  schedule:
    - cron: "0 10 * * 0"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: llama-swap-sd-cuda
            dockerfile: Dockerfile
            cache_scope: llama-swap-sd-cuda
          - image_name: llama-swappo-sd-cuda
            dockerfile: Dockerfile.llama-swappo
            cache_scope: llama-swappo-sd-cuda

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image_name }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
