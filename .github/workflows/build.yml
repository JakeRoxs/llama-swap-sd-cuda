name: Build image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - Dockerfile.llama-swappo
      - docker/llama-swappo/**
      - .github/workflows/build.yml
  schedule:
    - cron: "0 10 * * 0"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEFAULT_IMAGE_NAME: llama-swap-sd-cuda
  SWAPPO_IMAGE_NAME: llama-swappo-sd-cuda

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push default image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.DEFAULT_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.DEFAULT_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ env.DEFAULT_IMAGE_NAME }}
          cache-to: type=gha,mode=max,scope=${{ env.DEFAULT_IMAGE_NAME }}

      - name: Build and push swappo image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.llama-swappo
          push: true
          platforms: linux/amd64
          build-args: |
            LLAMA_SWAP_SD_CUDA_BASE=${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.DEFAULT_IMAGE_NAME }}:${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.SWAPPO_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.SWAPPO_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ env.SWAPPO_IMAGE_NAME }}
          cache-to: type=gha,mode=max,scope=${{ env.SWAPPO_IMAGE_NAME }}
